<style>
.coming {
  padding: 200px 0 160px;
  text-align: center;
  background: var(--paper);
}
.coming-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-family: var(--en);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.32em;

  color: var(--ink-soft);
  margin-bottom: 32px;
}
.coming-eyebrow::before {

}
.coming-title {

  font-size: clamp(40px, 6vw, 96px);

.coming-body {
  max-width: 540px;
  margin: 0 auto 48px;
  font-size: 16px;
  line-height: 2.1;
  color: var(--ink-soft);
}
.sdg-strip {
  margin: 80px auto 0;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
  max-width: 760px;
  padding: 0 clamp(20px, 4vw, 56px);
}
.sdg-strip img {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--paper-2);
  padding: 10px;
}
@media (max-width: 700px) {
  .sdg-strip { grid-template-columns: repeat(3, 1fr); }
