<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <radialGradient id="g1-bg" cx="70%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a0a07"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="g1-sphere" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff8a6a"/>
      <stop offset="60%" stop-color="#ff5a3c"/>
      <stop offset="100%" stop-color="#a02a18"/>
    </radialGradient>
    <linearGradient id="g1-torus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5a3c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff5a3c" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#g1-bg)"/>

  <!-- wireframe cube (rotates) -->
  <g stroke="#ff5a3c" stroke-width="1.4" fill="none" opacity="0.75">
    <g transform-origin="170 320">
      <animateTransform attributeName="transform" type="rotate" from="0 170 320" to="360 170 320" dur="22s" repeatCount="indefinite"/>
      <path d="M120 280 L210 240 L210 330 L120 370 Z"/>
      <path d="M210 240 L290 270 L290 360 L210 330"/>
      <path d="M120 280 L200 310 L290 270"/>
      <path d="M200 310 L200 400 L120 370 M200 400 L290 360"/>
    </g>
  </g>

  <!-- torus ring (rotates the other way) -->
  <g transform="translate(420 130)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="-25" to="335" dur="18s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="90" ry="32" fill="none" stroke="url(#g1-torus)" stroke-width="22"/>
      <ellipse cx="0" cy="0" rx="90" ry="32" fill="none" stroke="#ff8a6a" stroke-width="2" opacity="0.5"/>
    </g>
  </g>

  <!-- sphere (gentle bob) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <circle cx="300" cy="200" r="78" fill="url(#g1-sphere)"/>
    <ellipse cx="280" cy="180" rx="22" ry="14" fill="#ffd5c4" opacity="0.55"/>
  </g>

  <!-- floating dots -->
  <circle cx="80" cy="120" r="3" fill="#ff5a3c">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="320" r="2" fill="#ff5a3c" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="380" r="4" fill="#ff5a3c" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
