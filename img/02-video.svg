      <rect x="-150" y="0" width="900" height="90" fill="url(#g2-strip)"/>
      <rect x="-150" y="0" width="900" height="90" fill="none" stroke="#ff5a3c" stroke-width="1" opacity="0.8"/>
      <g fill="#0a0a0a">
        <rect x="-100" y="8" width="24" height="14" rx="2"/>
        <rect x="-50" y="8" width="24" height="14" rx="2"/>
        <rect x="0" y="8" width="24" height="14" rx="2"/>
        <rect x="50" y="8" width="24" height="14" rx="2"/>
