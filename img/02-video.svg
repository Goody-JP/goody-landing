<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <radialGradient id="g2-bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0a07"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="g2-strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5a3c" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ff5a3c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff5a3c" stop-opacity="0.15"/>
