        <rect x="-50" y="68" width="24" height="14" rx="2"/>
        <rect x="0" y="68" width="24" height="14" rx="2"/>
        <rect x="50" y="68" width="24" height="14" rx="2"/>
        <rect x="100" y="68" width="24" height="14" rx="2"/>
        <rect x="150" y="68" width="24" height="14" rx="2"/>
