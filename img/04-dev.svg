<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <radialGradient id="g4-bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0a07"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="g4-bracket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a6a"/>
      <stop offset="100%" stop-color="#ff5a3c"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#g4-bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f1f1f" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- typing code lines -->
  <g fill="#3a3a3a">
    <rect x="80" y="80" width="0" height="6" rx="2">
      <animate attributeName="width" values="0;90;90;0" keyTimes="0;0.4;0.8;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="100" width="0" height="6" rx="2">
      <animate attributeName="width" values="0;0;70;70;0" keyTimes="0;0.2;0.6;0.8;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="370" width="0" height="6" rx="2">
      <animate attributeName="width" values="0;120;120;0" keyTimes="0;0.5;0.85;1" dur="7s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="80" width="0" height="6" rx="2">
      <animate attributeName="width" values="0;70;70;0" keyTimes="0;0.45;0.85;1" dur="6.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="100" width="0" height="6" rx="2">
      <animate attributeName="width" values="0;0;90;90;0" keyTimes="0;0.25;0.65;0.85;1" dur="6.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="370" width="0" height="6" rx="2">
      <animate attributeName="width" values="0;130;130;0" keyTimes="0;0.55;0.9;1" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- left bracket { -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; -6 0; 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <path d="M260 90 Q200 90 200 150 L200 200 Q200 225 175 225 Q200 225 200 250 L200 300 Q200 360 260 360"
          fill="none" stroke="url(#g4-bracket)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- right bracket } -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 6 0; 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <path d="M340 90 Q400 90 400 150 L400 200 Q400 225 425 225 Q400 225 400 250 L400 300 Q400 360 340 360"
          fill="none" stroke="url(#g4-bracket)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- center dots typing -->
  <circle cx="280" cy="225" r="5" fill="#ff5a3c">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="225" r="5" fill="#ff5a3c">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="225" r="5" fill="#ff5a3c">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
