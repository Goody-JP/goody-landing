<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <radialGradient id="g3-bg" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0a07"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#g3-bg)"/>

  <!-- back card (drift) -->
  <g transform="translate(380 80) rotate(8)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="0" y="0" width="180" height="240" rx="12" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
      <circle cx="14" cy="14" r="3" fill="#ff5a3c" opacity="0.5"/>
      <circle cx="26" cy="14" r="3" fill="#3a3a3a"/>
      <circle cx="38" cy="14" r="3" fill="#3a3a3a"/>
      <rect x="14" y="34" width="100" height="8" rx="2" fill="#3a3a3a"/>
      <rect x="14" y="50" width="60" height="6" rx="2" fill="#2a2a2a"/>
      <rect x="14" y="74" width="152" height="60" rx="6" fill="#1f1f1f"/>
      <rect x="14" y="146" width="152" height="40" rx="6" fill="#1f1f1f"/>
      <rect x="14" y="200" width="80" height="22" rx="11" fill="#ff5a3c" opacity="0.4"/>
    </g>
  </g>

  <!-- middle card (drift opposite) -->
  <g transform="translate(220 100) rotate(-2)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 6; 0 0" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="0" y="0" width="200" height="280" rx="14" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="3.5" fill="#ff5a3c" opacity="0.7"/>
      <circle cx="28" cy="14" r="3.5" fill="#3a3a3a"/>
      <circle cx="42" cy="14" r="3.5" fill="#3a3a3a"/>
      <rect x="14" y="36" width="120" height="10" rx="3" fill="#555"/>
      <rect x="14" y="54" width="80" height="7" rx="2" fill="#333"/>
      <rect x="14" y="80" width="172" height="80" rx="8" fill="#0e0e0e" stroke="#2a2a2a"/>
      <circle cx="100" cy="120" r="22" fill="#ff5a3c" opacity="0.6">
        <animate attributeName="r" values="20;26;20" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.85;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>
      <rect x="14" y="174" width="172" height="48" rx="8" fill="#222"/>
      <rect x="14" y="234" width="100" height="28" rx="14" fill="#ff5a3c"/>
    </g>
  </g>

  <!-- front floating card -->
  <g transform="translate(80 200) rotate(-12)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 6 -4; 0 0" dur="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="0" y="0" width="160" height="100" rx="10" fill="#202020" stroke="#ff5a3c" stroke-width="1.5"/>
      <rect x="12" y="14" width="60" height="8" rx="2" fill="#666"/>
      <rect x="12" y="30" width="120" height="5" rx="2" fill="#3a3a3a"/>
      <rect x="12" y="42" width="100" height="5" rx="2" fill="#3a3a3a"/>
      <rect x="12" y="64" width="50" height="22" rx="11" fill="#ff5a3c"/>
    </g>
  </g>

  <!-- moving cursor -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="330 290; 280 220; 380 260; 330 290" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <path d="M0 0 L0 22 L6 16 L11 26 L15 24 L10 14 L18 14 Z" fill="#ff5a3c" stroke="white" stroke-width="1"/>
  </g>

  <!-- floating dots -->
  <circle cx="60" cy="80" r="3" fill="#ff5a3c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="380" r="2" fill="#ff5a3c" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
