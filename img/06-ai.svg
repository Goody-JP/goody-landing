<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <radialGradient id="g6-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a1a10"/>
      <stop offset="40%" stop-color="#1a0a07"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="g6-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ffd5c4"/>
      <stop offset="60%" stop-color="#ff5a3c"/>
      <stop offset="100%" stop-color="#ff5a3c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#g6-bg)"/>

  <!-- breathing glow -->
  <circle cx="300" cy="225" r="180" fill="url(#g6-core)" opacity="0.45">
    <animate attributeName="r" values="160;200;160" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <animate attributeName="opacity" values="0.35;0.55;0.35" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- orbital rings (each rotates) -->
  <g fill="none" stroke="#ff5a3c" opacity="0.4">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 300 225" to="360 300 225" dur="20s" repeatCount="indefinite"/>
      <ellipse cx="300" cy="225" rx="180" ry="60" stroke-width="1"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="60 300 225" to="420 300 225" dur="25s" repeatCount="indefinite"/>
      <ellipse cx="300" cy="225" rx="180" ry="60" stroke-width="1"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="-60 300 225" to="300 300 225" dur="22s" repeatCount="indefinite"/>
      <ellipse cx="300" cy="225" rx="180" ry="60" stroke-width="1"/>
    </g>
  </g>
  <g fill="none" stroke="#ff8a6a" opacity="0.6">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="20 300 225" to="-340 300 225" dur="16s" repeatCount="indefinite"/>
      <ellipse cx="300" cy="225" rx="120" ry="40" stroke-width="1.2"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="-40 300 225" to="320 300 225" dur="18s" repeatCount="indefinite"/>
      <ellipse cx="300" cy="225" rx="120" ry="40" stroke-width="1.2"/>
    </g>
  </g>

  <!-- particle dots (twinkle) -->
  <g fill="#ff5a3c">
    <circle cx="120" cy="225" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="225" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="120" r="2.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="330" r="2.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="320" r="2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="130" r="2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="60" r="2.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="390" r="2.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="180" r="2" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="280" r="2" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="320" r="3" opacity="0.5"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="100" r="2.5" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="100" r="2" opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="380" r="2" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- pulsing core -->
  <circle cx="300" cy="225" r="22" fill="#ff5a3c">
    <animate attributeName="r" values="20;28;20" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="225" r="14" fill="#ffb29d">
    <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="225" r="6" fill="#ffffff">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
